name: 🎯 Daily Job Hunt

on:
  schedule:
    # 8:00 AM CST every day (CST = UTC-6, so 14:00 UTC)
    - cron: "0 14 * * *"

  # Lets you click "Run workflow" manually in the Actions tab
  workflow_dispatch:

jobs:
  hunt:
    name: Fetch job listings
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit results back to the repo

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the bot can push back
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the hunter ──────────────────────────────────────────────────
      - name: Run job_hunter.py
        env:
          # Optional — add these in: Settings → Secrets → Actions
          # Sign up free at https://developer.adzuna.com/
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # Sign up free at https://www.eventbrite.com/platform/api
          EVENTBRITE_KEY: ${{ secrets.EVENTBRITE_KEY }}
        run: python job_hunter.py

      # ── 5. Commit results back to the repo ─────────────────────────────────
      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ logs/

          # Only commit if something actually changed (avoids empty commits)
          if git diff --staged --quiet; then
            echo "Nothing new to commit today."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: job hunt results for ${DATE} [skip ci]"
            git push
          fi

      # ── 6. Upload CSV as a downloadable artifact ───────────────────────────
      - name: Upload daily CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-${{ env.DATE || 'today' }}
          path: data/jobs_*.csv
          retention-days: 30
          # Won't fail the run if no CSV was produced (no new jobs)
          if-no-files-found: warn
